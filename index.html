<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Clock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#071320;
}

.clock{
    width:260px;
    height:260px;
    background:rgba(18,32,48,.92);
    border:1px solid rgba(0,174,239,.45);
    border-radius:24px;
    box-shadow:0 0 20px rgba(0,174,239,.20);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.icon{
    font-size:26px;
    margin-bottom:12px;
}

.day{
    color:#d7e6f5;
    font-size:17px;
    letter-spacing:2px;
    margin-bottom:6px;
}

.date{
    color:#1EAEFF;
    font-size:22px;
    margin-bottom:28px;
}

.timeRow{
    display:flex;
    align-items:flex-end;
}

#time{
    color:white;
    font-size:72px;
    font-weight:300;
    line-height:1;
}

#ampm{
    color:#1EAEFF;
    font-size:22px;
    margin-left:8px;
    margin-bottom:10px;
}

</style>

</head>

<body>

<div class="clock">

<div class="icon">📅</div>

<div class="day" id="day"></div>

<div class="date" id="date"></div>

<div class="timeRow">
<div id="time"></div>
<div id="ampm"></div>
</div>

</div>

<script>

function updateClock(){

const now = new Date();

const dayNames = [
"Sunday","Monday","Tuesday","Wednesday",
"Thursday","Friday","Saturday"
];

const monthNames = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

let hour = now.getHours();
const minute = String(now.getMinutes()).padStart(2,"0");
const ampm = hour >= 12 ? "PM" : "AM";

hour = hour % 12;
if(hour === 0) hour = 12;

document.getElementById("time").textContent = hour + ":" + minute;
document.getElementById("ampm").textContent = ampm;

document.getElementById("day").textContent =
dayNames[now.getDay()].toUpperCase();

document.getElementById("date").textContent =
monthNames[now.getMonth()] + " " +
now.getDate() + ", " +
now.getFullYear();

}

updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
