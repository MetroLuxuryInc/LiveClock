<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Clock</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{

    background:#071320;

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.clock{

    width:380px;
    height:380px;

    border-radius:28px;

    background:rgba(20,35,55,.85);

    border:2px solid rgba(0,174,239,.55);

    box-shadow:
        0 0 30px rgba(0,174,239,.25);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    color:white;

}

.icon{

    font-size:36px;

    margin-bottom:18px;

}

.day{

    font-size:22px;

    letter-spacing:3px;

    color:#cfd8e6;

    margin-bottom:8px;

}

.date{

    font-size:30px;

    color:#1ea9ff;

    margin-bottom:35px;

}

.time{

    display:flex;

    align-items:flex-end;

}

#time{

    font-size:110px;

    font-weight:300;

    line-height:1;

    color:white;

}

#ampm{

    font-size:34px;

    color:#1ea9ff;

    margin-left:10px;

    margin-bottom:18px;

}

</style>

</head>

<body>

<div class="clock">

<div class="icon">📅</div>

<div class="day" id="day"></div>

<div class="date" id="date"></div>

<div class="time">

<div id="time"></div>

<div id="ampm"></div>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

const days=[
"Sunday",
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday"
];

const months=[
"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"
];

let h=now.getHours();

let m=String(now.getMinutes()).padStart(2,"0");

let ap=h>=12?"PM":"AM";

h=h%12;

if(h==0) h=12;

document.getElementById("time").innerHTML=h+":"+m;

document.getElementById("ampm").innerHTML=ap;

document.getElementById("day").innerHTML=days[now.getDay()].toUpperCase();

document.getElementById("date").innerHTML=
months[now.getMonth()]+" "+now.getDate()+", "+now.getFullYear();

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
