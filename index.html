<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Digital Clock</title>

<style>

:root{

    /* CHANGE ONLY THIS VALUE TO RESIZE THE ENTIRE CLOCK */

    --widget-size:250px;

    /* COLORS */

    --background:#071320;
    --card:#162333;
    --accent:#1EAEFF;
    --text:#FFFFFF;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{

    background:var(--background);

    height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

}

.clock{

    width:var(--widget-size);
    height:var(--widget-size);

    background:rgba(22,35,51,.96);

    border:1px solid rgba(30,174,255,.40);

    border-radius:calc(var(--widget-size)*0.09);

    box-shadow:
        0 0 calc(var(--widget-size)*0.08)
        rgba(30,174,255,.20);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

}

.day{

    color:var(--text);

    font-size:calc(var(--widget-size)*0.055);

    letter-spacing:2px;

    margin-bottom:calc(var(--widget-size)*0.01);

}

.date{

    color:var(--accent);

    font-size:calc(var(--widget-size)*0.068);

    margin-bottom:calc(var(--widget-size)*0.035);

}

.timeRow{

    display:flex;

    align-items:flex-end;

}

#time{

    color:var(--text);

    font-size:calc(var(--widget-size)*0.245);

    font-weight:300;

    line-height:1;

}

#ampm{

    color:var(--accent);

    font-size:calc(var(--widget-size)*0.065);

    margin-left:calc(var(--widget-size)*0.02);

    margin-bottom:calc(var(--widget-size)*0.03);

}

</style>

</head>

<body>

<div class="clock">

<div class="day" id="day"></div>

<div class="date" id="date"></div>

<div class="timeRow">

<div id="time"></div>

<div id="ampm"></div>

</div>

</div>

<script>

function updateClock(){

const now = new Date();

const days = [
"Sunday",
"Monday",
"Tuesday",
"Wednesday",
"Thursday",
"Friday",
"Saturday"
];

const months = [
"January",
"February",
"March",
"April",
"May",
"June",
"July",
"August",
"September",
"October",
"November",
"December"
];

let hour = now.getHours();

const minute = String(now.getMinutes()).padStart(2,"0");

const ampm = hour >= 12 ? "PM" : "AM";

hour = hour % 12;

if(hour === 0){
    hour = 12;
}

document.getElementById("day").textContent =
days[now.getDay()].toUpperCase();

document.getElementById("date").textContent =
months[now.getMonth()] + " " +
now.getDate() + ", " +
now.getFullYear();

document.getElementById("time").textContent =
hour + ":" + minute;

document.getElementById("ampm").textContent =
ampm;

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
