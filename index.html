<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scalable Digital Clock</title>

<style>

:root{

    /* CHANGE ONLY THIS VALUE */

    --widget-size:250px;

    /* ---------------------- */

    --bg:#071320;
    --card:#162333;
    --blue:#1EAEFF;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{

    background:var(--bg);

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.clock{

    width:var(--widget-size);
    height:var(--widget-size);

    background:rgba(22,35,51,.95);

    border-radius:calc(var(--widget-size)*.09);

    border:1px solid rgba(30,174,255,.45);

    box-shadow:
        0 0 calc(var(--widget-size)*.08)
        rgba(30,174,255,.22);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

.icon{

    font-size:calc(var(--widget-size)*.08);

    margin-bottom:calc(var(--widget-size)*.03);

}

.day{

    color:white;

    font-size:calc(var(--widget-size)*.055);

    letter-spacing:2px;

    margin-bottom:calc(var(--widget-size)*.015);

}

.date{

    color:var(--blue);

    font-size:calc(var(--widget-size)*.07);

    margin-bottom:calc(var(--widget-size)*.08);

    text-align:center;

}

.timeRow{

    display:flex;

    align-items:flex-end;

}

#time{

    color:white;

    font-weight:300;

    line-height:1;

    font-size:calc(var(--widget-size)*.24);

}

#ampm{

    color:var(--blue);

    font-size:calc(var(--widget-size)*.07);

    margin-left:calc(var(--widget-size)*.02);

    margin-bottom:calc(var(--widget-size)*.03);

}

</style>

</head>

<body>

<div class="clock">

<div class="icon">📅</div>

<div class="day" id="day"></div>

<div class="date" id="date"></div>

<div class="timeRow">

<div id="time"></div>

<div id="ampm"></div>

</div>

</div>

<script>

function updateClock(){

const now=new Date();

const days=[
"Sunday","Monday","Tuesday","Wednesday",
"Thursday","Friday","Saturday"
];

const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];

let h=now.getHours();

const m=String(now.getMinutes()).padStart(2,"0");

const ap=h>=12?"PM":"AM";

h=h%12;

if(h===0) h=12;

document.getElementById("time").textContent=h+":"+m;

document.getElementById("ampm").textContent=ap;

document.getElementById("day").textContent=
days[now.getDay()].toUpperCase();

document.getElementById("date").textContent=
months[now.getMonth()]+" "+now.getDate()+", "+now.getFullYear();

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
