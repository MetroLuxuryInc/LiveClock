<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Compact Clock</title>

<style>

:root{

    /* CHANGE ONLY THIS VALUE */
    --widget-size:250px;

    --bg:#071320;
    --card:#162333;
    --accent:#1EAEFF;
    --text:#FFFFFF;

}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",Arial,sans-serif;
}

body{

    background:var(--bg);

    display:flex;

    justify-content:center;

    align-items:center;

    height:100vh;

}

.clock{

    width:var(--widget-size);
    height:var(--widget-size);

    background:rgba(22,35,51,.96);

    border-radius:calc(var(--widget-size)*0.09);

    border:1px solid rgba(30,174,255,.40);

    box-shadow:0 0 calc(var(--widget-size)*0.08)
               rgba(30,174,255,.18);

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    overflow:hidden;

}

.day{

    color:white;

    font-size:calc(var(--widget-size)*0.052);

    letter-spacing:2px;

    line-height:1;

    margin:0;

    padding:0;

}

.date{

    color:var(--accent);

    font-size:calc(var(--widget-size)*0.066);

    line-height:1;

    margin:2px 0 0 0;

    padding:0;

}

.timeRow{

    display:flex;

    align-items:flex-end;

    line-height:1;

    margin-top:2px;

}

#time{

    color:white;

    font-size:calc(var(--widget-size)*0.29);

    font-weight:300;

    line-height:.9;

}

#ampm{

    color:var(--accent);

    font-size:calc(var(--widget-size)*0.055);

    margin-left:4px;

    margin-bottom:5px;

}

</style>

</head>

<body>

<div class="clock">

<div class="day" id="day"></div>

<div class="date" id="date"></div>

<div class="timeRow">
<div id="time"></div>
<div id="ampm"></div>
</div>

</div>

<script>

function updateClock(){

const now=new Date();

const days=[
"Sunday","Monday","Tuesday","Wednesday",
"Thursday","Friday","Saturday"
];

const months=[
"January","February","March","April",
"May","June","July","August",
"September","October","November","December"
];

let h=now.getHours();
let m=String(now.getMinutes()).padStart(2,"0");

const ap=h>=12?"PM":"AM";

h=h%12;
if(h===0)h=12;

document.getElementById("day").textContent=
days[now.getDay()].toUpperCase();

document.getElementById("date").textContent=
months[now.getMonth()]+" "+now.getDate()+", "+now.getFullYear();

document.getElementById("time").textContent=
h+":"+m;

document.getElementById("ampm").textContent=
ap;

}

updateClock();

setInterval(updateClock,1000);

</script>

</body>
</html>
